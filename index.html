<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homenaje a las Madres - Edición Especial</title>
    <!-- Fuentes modernas y elegantes -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;1,600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Contenedor para el efecto Bokeh (luces flotantes) -->
    <div id="particles-container"></div>

    <!-- Contenedor 3D -->
    <main class="tilt-wrapper" id="tilt-wrapper">
        <article class="glass-card" id="glass-card">
            <div class="card-content">
                <div class="floating-icon">✨🤍✨</div>
                <h1 class="gradient-text">Feliz Día<br>de las Madres</h1>
                
                <!-- Carrusel de frases dinámicas -->
                <div class="quote-container">
                    <p id="quote-text" class="fade-transition">A todas las mujeres que son refugio, fuerza y el amor más puro del universo.</p>
                </div>
                
                <div class="card-footer">
                    <div class="line"></div>
                    <span class="share-hint">Celebremos su luz</span>
                    <div class="line"></div>
                </div>
            </div>
        </article>
    </main>

    <!-- Firma de Autor Estilo Neón/Cyber-Elegante -->
    <footer class="signature-container">
        <a href="#" class="neon-signature">
            Realizado por <strong>Manuel Cabello</strong>
        </a>
    </footer>

    <!-- Reproductor de audio oculto (sin el atributo 'controls') -->
    <audio id="bg-music" autoplay loop>
        <source src="Musica.mp3" type="audio/mpeg">
    </audio>

    <script src="script.js"></script>
</body>
</html>
